<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project | Ariel Armoni</title>
    <meta name="description" content="Exhibition design project by Ariel Armoni - architect and exhibition designer.">

    <!-- Open Graph -->
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="Ariel Armoni | Exhibition Architecture">
    <meta property="og:title" content="Project | Ariel Armoni">
    <meta property="og:description" content="Exhibition design project by Ariel Armoni.">
    <meta property="og:image" content="">
    <meta name="twitter:card" content="summary_large_image">

    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>A</text></svg>">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <a href="#" id="prev-project" class="nav-arrow" style="left: 2%;">&#8592;</a>
    <a href="#" id="next-project" class="nav-arrow" style="right: 2%;">&#8594;</a>

    <div id="site-wrapper">
        <header>
            <div class="nav-wrapper">
                <div class="main-nav-links">
                    <span class="nav-label" id="projects-trigger">Projects</span>
                    <a href="about.html" class="nav-label">About</a>
                    <a href="contact.html" class="nav-label">Contact</a>
                </div>
            </div>
            <a href="index.html" class="logo">ARIEL ARMONI</a>
            <div class="sub-logo" style="font-size: 13px; letter-spacing: 2px; color: #888; text-transform: uppercase; margin-top: 8px;">Exhibition Architecture</div>
        </header>

        <main>
            <div style="text-align: center; padding: 60px 5% 20px;">
                <h1 id="project-title" style="font-size: 20px; letter-spacing: 4px; text-transform: uppercase; font-weight: 400; margin-bottom: 25px;"></h1>
                <div id="project-meta" class="project-meta"></div>
                <div id="project-desc" class="project-description"></div>
            </div>
            <div id="gallery" class="gallery"></div>
        </main>
    </div>

    <script src="sidebar.js"></script>
    <script>
        async function initProject() {
            const folder = new URLSearchParams(window.location.search).get('folder');
            if (!folder) return;

            try {
                const resList = await fetch(`${baseURL}/list.txt?v=${cacheBuster}`);
                const folders = (await resList.text()).split(/\r?\n/).map(f => f.trim()).filter(f => f !== "");
                const idx = folders.indexOf(folder);

                if (idx !== -1) {
                    document.getElementById('prev-project').href = `project.html?folder=${folders[idx <= 0 ? folders.length - 1 : idx - 1]}`;
                    document.getElementById('next-project').href = `project.html?folder=${folders[idx >= folders.length - 1 ? 0 : idx + 1]}`;
                }

                const res = await fetch(`${baseURL}/images/${folder}/info.txt?v=${cacheBuster}`);
                const lines = (await res.text()).split(/\r?\n/).map(l => l.trim()).filter(l => l !== "");

                const projectTitle = lines[0];
                document.getElementById('project-title').textContent = projectTitle;

                document.title = `${projectTitle} | Ariel Armoni`;
                document.querySelector('meta[property="og:title"]').setAttribute('content', `${projectTitle} | Ariel Armoni`);

                const coverURL = `${baseURL}/images/${folder}/cover.webp`;
                document.querySelector('meta[property="og:image"]').setAttribute('content', coverURL);

                const metaDiv = document.getElementById('project-meta');
                const descDiv = document.getElementById('project-desc');

                lines.slice(1).forEach(line => {
                    if (line.includes(":")) {
                        const [k, ...v] = line.split(":");
                        const item = document.createElement('div');
                        item.className = 'meta-item';
                        item.innerHTML = `<span class="label">${k.trim()}:</span><span class="value">${v.join(":").trim()}</span>`;
                        metaDiv.appendChild(item);
                    } else {
                        const br = descDiv.innerHTML ? '<br><br>' : '';
                        descDiv.innerHTML += br + line;
                    }
                });

                const gallery = document.getElementById('gallery');
                for (let i = 1; i <= 50; i++) {
                    const imgNum = i.toString().padStart(2, '0');
                    const img = document.createElement('img');
                    img.src = `${baseURL}/images/${folder}/${imgNum}.jpg`;
                    img.alt = `${projectTitle} - image ${i}`;
                    img.style.display = 'block';
                    gallery.appendChild(img);

                    const ok = await new Promise((resolve) => {
                        img.onload = () => resolve(true);
                        img.onerror = () => { img.remove(); resolve(false); };
                    });

                    if (!ok) break;
                }

            } catch (e) { console.error(e); }
        }
        initProject();
    </script>
</body>
</html>
