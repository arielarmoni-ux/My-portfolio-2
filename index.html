<body>
    <div id="site-wrapper">
        <header>
            <div class="nav-wrapper">
                <div class="main-nav-links">
                    <span class="nav-label" id="projects-trigger">Projects</span>
                    <a href="about.html" class="nav-label">About</a>

                </div>
            </div>
            <a href="index.html" class="logo">
                <h1 class="logo-h1">ARIEL ARMONI</h1>
            </a>
            <div class="sub-logo" style="font-size: 13px; letter-spacing: 2px; color: #888; text-transform: uppercase; margin-top: 8px;">Exhibition Architecture</div>
        </header>

        <main class="portfolio-grid" id="portfolio-grid">
        </main>
    </div>

    <script src="sidebar.js"></script>

    <script>
        async function loadGrid() {
            const grid = document.getElementById('portfolio-grid');

            try {
                const res = await fetch(`${baseURL}/list.txt?v=${cacheBuster}`);
                if (!res.ok) throw new Error('Could not load project list');

                const folders = (await res.text()).split(/\r?\n/).filter(f => f.trim() !== "");

                const projectDataPromises = folders.map(async (f) => {
                    try {
                        const iR = await fetch(`${baseURL}/images/${f}/info.txt?v=${cacheBuster}`);
                        const title = iR.ok ? (await iR.text()).split('\n')[0].trim() : f;
                        return { folder: f, title, success: true };
                    } catch (err) {
                        console.error(`Error fetching info for ${f}:`, err);
                        return { folder: f, title: f, success: false };
                    }
                });

                const allProjects = await Promise.all(projectDataPromises);

                grid.innerHTML = '';

                const fragment = document.createDocumentFragment();
                allProjects.forEach(project => {
                    const card = document.createElement('a');
                    card.href = `project.html?folder=${project.folder}`;
                    card.className = 'project-card';

                    const imgContainer = document.createElement('div');
                    imgContainer.className = 'img-container';

                    const img = document.createElement('img');
                    img.src = `${baseURL}/images/${project.folder}/cover.webp`;
                    img.alt = `${project.title} - Exhibition Design by Ariel Armoni`;
                    img.loading = 'lazy';
                    img.decoding = 'async';

                    imgContainer.appendChild(img);

                    const info = document.createElement('div');
                    info.className = 'project-info';

                    const title = document.createElement('div');
                    title.className = 'project-title';
                    title.textContent = project.title;

                    info.appendChild(title);
                    card.appendChild(imgContainer);
                    card.appendChild(info);
                    fragment.appendChild(card);
                });

                grid.appendChild(fragment);

            } catch (err) {
                console.error('Error loading grid:', err);
            }
        }

        loadGrid();
    </script>
</body>
</html>
